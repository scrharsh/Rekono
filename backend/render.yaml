services:
  - type: web
    name: rekono-backend
    env: node
    plan: free
    buildCommand: npm install --include=dev && npm run build
    startCommand: node --max-old-space-size=256 dist/main
    healthCheckPath: /v1/auth/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: PAYMENT_WEBHOOK_SECRET
        sync: false
      - key: RAZORPAY_PAYMENT_WEBHOOK_SECRET
        sync: false
      - key: PHONEPE_WEBHOOK_SECRET
        sync: false
