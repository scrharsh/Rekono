services:
  - type: web
    name: rekono-backend
    env: node
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm run start:prod
    healthCheckPath: /v1/auth/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRATION
        value: 7d
      - key: ALLOWED_ORIGINS
        sync: false
      - key: THROTTLE_TTL
        value: 60000
      - key: THROTTLE_TTL_MS
        value: 60000
      - key: THROTTLE_LIMIT
        value: 100
      - key: ENABLE_SWAGGER
        value: false
      - key: PAYMENT_WEBHOOK_SECRET
        sync: false
